# Site settings 配置站点
title: 'Matthew’s Blog'
description: 'This blog is used to record my study notes and project materials'
keywords: 'Computer Sciences, Machine Learning, Artificial Intelligence'
url: 'https://MatthewMaxy.github.io' # your host

# nav 中文字符空格：&emsp;
nav: # 最佳体验 六个标签 且最好每个标签不超过4中文字
  Home: '/'
  Tags: '/tags.html'
  TimeLine: '/timeline.html'
  About: '/about.html'
  Friends: '/friendLink.html'

# 博主
author: true
name: 'Matthew'
NickName: '主谓定状补'
webtitle: 'Matthew’s Blog'
bio: 'Southeast University - Software Engineering'
about: true
aboutyou: 'I am an undergraduate student majoring in Software Engineering at Southeast University. My research interest includes Computer Vision, Multimodal learning and AIGC'
portraits: '/assets/profile.jpeg' # your portraits image file path

# SNS
SNS: true
SNS-icon: #['Facebook', 'weibo', 'qq', 'github', 'Dribbble', 'Twitter', 'instagram', 'weixin', 'Codepen', 'Huggingface']
  mail: 'mailto:matthewma0211@gmail.com'
  qq: 'http://wpa.qq.com/msgrd?v=3&uin=1123957599&site=qq&menu=yes'
  weixin: ''
  github: 'https://github.com/MatthewMaxy'
  weibo: 'https://m.weibo.cn/profile/5860228438'
  Google: ''


# 分页
paginate: 8
paginatepath: ['page:num']

# since
footer:
  since: 2024

# Markdown
markdown: kramdown
kramdown:
  input: GFM
# 代码高亮 使用rouge
highlighter: rouge
# 代码高亮主题使用pygments主题: autumn\ default\ emacs\ friendly\ manni\ murphy\ pastie\ perldoc\ tango 任选一个你喜欢的主题名称填在下面的单引号中
pygmentsTheme: 'emacs'

# 友情链接
friends:
  Elainax: https://elainax.github.io/
  Hopesaboteur: https://hopesaboteur.github.io/


# 评论 最佳体验 在disqus、livere和Gitment之间三选一
# disqus 评论
disqus: true
disqus_url: 'https://abc.disqus.com/embed.js'
# 来必力评论
livere: false
livere_uid: 'MTAyMC8zNDI2OS8xMDgwNg==' # MTAyMC8zNDI2OS8xMDgwNg==
# Gitment评论 OAuth Application
Gitment: false
Gitment_owner: 'MatthewMaxy'  # github用户名
Gitment_repo: 'MatthewMaxy.github.io'  # github博客存放的仓库名
client_id: ''  # 注册 OAuth Application 后获得的 client_id
client_secret: '' # 注册 OAuth Application 后获得的 client_secret

# Share : weibo, qq, wechat, tencent, douban, qzone, linkedin, diandian, facebook, twitter, google
social-share: true
social-share-items: ['qq', 'wechat', 'weibo', 'twitter', 'facebook']

# 百度统计 在baidu-url里填写自己相关的url代码
baidu: true
baidu-url: '0623aee37280ac65c5045ca0f19126b4'
# 谷歌分析 在google-ID里填写自己在谷歌分析获得的追踪ID
google: false
google-ID: ''

# 博客头信息备选颜色（该部分在站点中不充当站点变量，将其写在post的头信息中用来充当页面变量）
color: rgb(154,133,255) rgb(255,90,90) rgb(255,210,32) rgb(98,170,255)
renderer: marked